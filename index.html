<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .leaderboard { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .player-column { background: #161616; padding: 25px; border-radius: 20px; min-width: 300px; border: 1px solid #222; }
        .score { font-size: 4rem; color: #00ff88; font-weight: bold; margin: 0; }
        .task-card { background: #222; padding: 15px; margin-top: 10px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; border-left: 5px solid #00ff88; }
        .task-card:hover { background: #2a2a2a; }
        .check { width: 20px; height: 20px; border: 2px solid #00ff88; margin-right: 15px; border-radius: 4px; }
        .form-link { background: #00ff88; color: black; padding: 15px 30px; text-decoration: none; border-radius: 10px; font-weight: bold; margin-bottom: 30px; }
    </style>
</head>
<body>

    <a href="https://forms.gle/ckCAEpauuLvzRmSj8" target="_blank" class="form-link">CREATE NEW TASK +</a>

    <div class="leaderboard" id="arena">Loading Arena...</div>

<script>
    const LIVE_TASKS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtF-7BhHKReQgwl6fhdU3UL8QqRvQHLWeNvU42tssJknaTXX0LZgqkeaZeSv6e_FT-cHOi6hlAvpEG/pub?gid=716577834&single=true&output=csv';
    const TALLY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtF-7BhHKReQgwl6fhdU3UL8QqRvQHLWeNvU42tssJknaTXX0LZgqkeaZeSv6e_FT-cHOi6hlAvpEG/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVQEubkC7opGHCflAizfLVezAhG0gFy5mEIS7qmpTz8scvvj4P9K4GNPmFc_rCh_hCHQ/exec';

    async function refresh() {
        const [taskRes, tallyRes] = await Promise.all([fetch(LIVE_TASKS_CSV), fetch(TALLY_CSV)]);
        const taskText = await taskRes.text();
        const tallyText = await tallyRes.text();

        Papa.parse(taskText, { header: true, complete: (tasks) => {
            Papa.parse(tallyText, { header: true, complete: (tallies) => {
                render(tasks.data, tallies.data);
            }});
        }});
    }

    function render(tasks, tallies) {
        let scores = { "Isabella": 0, "Liv": 0 };
        let boards = { "Isabella": [], "Liv": [] };

        // Calculate Totals from Tally Tab
        tallies.forEach(row => {
            if (scores.hasOwnProperty(row.Name)) scores[row.Name] += parseInt(row.Points) || 0;
        });

        // Failure to Rest Penalty
        Object.keys(scores).forEach(n => { if(scores[n] >= 200) scores[n] -= 10; });

        // Build Active Task Lists
        tasks.forEach(row => {
            const name = row["Who are you?"];
            if (boards.hasOwnProperty(name)) {
                boards[name].push({ task: row["Task Name"], pts: row["Points"] });
            }
        });

        const container = document.getElementById('arena');
        container.innerHTML = '';

        Object.keys(scores).forEach(name => {
            let taskHtml = boards[name].map(t => `
                <div class="task-card" onclick="complete('${name}', '${t.task}', ${t.pts}, this)">
                    <div class="check"></div>
                    <div><b>${t.task}</b><br><small>${t.pts} PTS</small></div>
                </div>
            `).join('');

            container.innerHTML += `
                <div class="player-column">
                    <p class="score">${scores[name]}</p>
                    <hr style="border: 1px solid #333">
                    <h2 style="letter-spacing:3px; color:#666">${name}</h2>
                    <div>${taskHtml || '<p style="color:#444">No active tasks</p>'}</div>
                </div>
            `;
        });
    }

    function complete(name, task, pts, el) {
        el.style.opacity = '0.2';
        el.style.pointerEvents = 'none';
        // Send to Script to save points and delete the "Live" task
        fetch(`${SCRIPT_URL}?name=${name}&points=${pts}&task=${encodeURIComponent(task)}`, {mode: 'no-cors'});
        setTimeout(refresh, 2000);
    }

    refresh();
    setInterval(refresh, 30000);
</script>
</body>
</html>
