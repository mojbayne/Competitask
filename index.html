<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Competitask</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0a0a0a; 
            /* Muted / Dull Dark Mode Colors */
            --sc: #a37c86; 
            --sh: #6b8a7a; 
            --wl: #5b7a94; 
            --st: #918b6d; 
            --card: #121212; 
        }

        body { 
            background: var(--bg); color: #d1d1d1; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding-bottom: 90px; 
        }
        
        /* User Filter Bar */
        .user-bar { 
            display: flex; background: #0f0f0f; padding: 12px; gap: 10px; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1a1a1a; 
        }
        .user-btn { 
            flex: 1; border: 1px solid #222; background: #141414; color: #555; 
            padding: 8px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; 
            letter-spacing: 1px; cursor: pointer; transition: 0.2s; 
        }
        .user-btn.active { background: #222; color: #ddd; border-color: #444; }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: #0f0f0f; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #1a1a1a; 
        }
        .nav-item { 
            border: none; background: none; color: #444; font-size: 0.6rem; 
            cursor: pointer; display: flex; flex-direction: column; 
            align-items: center; text-transform: uppercase; letter-spacing: 1px; 
        }
        .nav-item.active.sc { color: var(--sc); }
        .nav-item.active.sh { color: var(--sh); }
        .nav-item.active.wl { color: var(--wl); }
        .nav-item.active.st { color: var(--st); }
        .nav-icon { font-size: 1.3rem; margin-bottom: 4px; filter: grayscale(40%); }

        /* Content Areas */
        .form-trigger {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .form-trigger:active {
            background: #222;
            color: #aaa;
        }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 1.2rem; font-weight: 300; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; }

        .task-card { 
            background: var(--card); padding: 16px; margin-bottom: 12px; 
            border-radius: 12px; display: flex; align-items: center; 
            border: 1px solid #1a1a1a; position: relative; 
        }
        .task-card::before { content: ''; position: absolute; left: 0; top: 15%; bottom: 15%; width: 3px; border-radius: 0 4px 4px 0; }
        .task-card.sc::before { background: var(--sc); }
        .task-card.sh::before { background: var(--sh); }
        .task-card.wl::before { background: var(--wl); }

        .check-box { width: 20px; height: 20px; border: 1px solid #333; border-radius: 50%; margin-right: 15px; }
        .pts-tag { margin-left: auto; font-size: 0.7rem; font-weight: bold; color: #555; }
        
        .score-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #1a1a1a; text-align: center; }
        .big-xp { font-size: 2.8rem; font-weight: 200; margin: 0; }
        .chart-container { background: var(--card); padding: 15px; border-radius: 15px; height: 250px; margin-top: 20px; border: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <div class="user-bar" id="userSelector">
        <button class="user-btn active" onclick="setUser('Isabella')">ISABELLA</button>
        <button class="user-btn" onclick="setUser('Liv')">LIV</button>
    </div>

    <div id="PageSC" class="page"> <h1 style="color:var(--sc)">Self Care</h1> <div id="list-sc"></div> </div>
    <div id="PageSH" class="page"> <h1 style="color:var(--sh)">Spiritual Health</h1> <div id="list-sh"></div> </div>
    <div id="PageWL" class="page"> <h1 style="color:var(--wl)">Workload</h1> <div id="list-wl"></div> </div>
    <div id="PageST" class="page active"> 
        <h1 style="color:var(--st)">Leaderboard</h1>
        <div id="stats-content"></div>
        <div class="chart-container"><canvas id="weeklyChart"></canvas></div>
    </div>
    <div id="PageST" class="page active"> 
    <h1 style="color:var(--st)">Leaderboard</h1>
    
    <div id="stats-content"></div>

    <button class="form-trigger" onclick="toggleForm()">+ Add Task</button>
    
    <div id="form-container" style="display:none; margin-top:20px; border-radius:15px; overflow:hidden; border:1px solid #1a1a1a;">
        <iframe src="https://forms.gle/rgALQ1WbBBJ9cTwo9" width="100%" height="500" frameborder="0">Loading…</iframe>
        <button onclick="toggleForm()" style="background:none; border:none; color:#444; width:100%; padding:15px; font-size:0.7rem; letter-spacing:1px;">CLOSE FORM</button>
    </div>

    <div class="chart-container"><canvas id="weeklyChart"></canvas></div>
</div>

    <nav class="bottom-nav">
        <button class="nav-item sc" onclick="showTab('PageSC', 'sc')"><span class="nav-icon">🌸</span>Care</button>
        <button class="nav-item sh" onclick="showTab('PageSH', 'sh')"><span class="nav-icon">✨</span>Spirit</button>
        <button class="nav-item wl" onclick="showTab('PageWL', 'wl')"><span class="nav-icon">📚</span>Work</button>
        <button class="nav-item active st" onclick="showTab('PageST', 'st')"><span class="nav-icon">📊</span>Stats</button>
    </nav>

<script>
    const LIVE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtF-7BhHKReQgwl6fhdU3UL8QqRvQHLWeNvU42tssJknaTXX0LZgqkeaZeSv6e_FT-cHOi6hlAvpEG/pub?gid=716577834&single=true&output=csv';
    const TALLY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtF-7BhHKReQgwl6fhdU3UL8QqRvQHLWeNvU42tssJknaTXX0LZgqkeaZeSv6e_FT-cHOi6hlAvpEG/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9VM_pdYiRueFjUE07mrfMJUmaHfXzLGQ8gvtsEa2nRNmdJCE6ctoGOWkdghOwxVrh0w/exec';

    let currentUser = 'Liv';
    let myChart;

    function toggleForm() {
    const f = document.getElementById('form-container');
    f.style.display = (f.style.display === 'none') ? 'block' : 'none';
    }
    
    function setUser(name) {
        currentUser = name;
        document.querySelectorAll('.user-btn').forEach(b => b.classList.toggle('active', b.innerText === name.toUpperCase()));
        fetchData();
    }

    function showTab(id, cls) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelector('.nav-item.'+cls).classList.add('active');
    }

    async function fetchData() {
        if(LIVE_CSV.includes('PASTE')) return;
        try {
            const [r1, r2] = await Promise.all([fetch(LIVE_CSV), fetch(TALLY_CSV)]);
            const tasks = Papa.parse(await r1.text(), {header:false}).data;
            const tallies = Papa.parse(await r2.text(), {header:false}).data;
            render(tasks, tallies);
        } catch (e) { console.error("Sync error"); }
    }

    function render(tasks, tallies) {
        let stats = { "isabella": { display: "Isabella", total: 0, weekly: [0,0,0,0,0,0,0] }, 
                      "liv": { display: "Liv", total: 0, weekly: [0,0,0,0,0,0,0] } };
        let taskGroups = { "Self Care": [], "Spiritual Health": [], "Workload": [] };

        tallies.forEach((row, i) => {
            if(i === 0 || row.length < 2) return;
            const name = (row[1]||"").trim().toLowerCase();
            const pts = parseInt(row[2]) || 0;
            const d = new Date(row[0]);
            if(stats[name]) {
                stats[name].total += pts;
                if(!isNaN(d.getDay())) stats[name].weekly[d.getDay()] += pts;
            }
        });

        tasks.forEach((row, i) => {
            if(i === 0) return;
            const rowUser = (row[1]||"").trim();
            const status = (row[5]||"").trim().toLowerCase();
            const cat = (row[4]||"").trim();

            if(rowUser === currentUser && status !== "completed" && taskGroups[cat]) {
                taskGroups[cat].push({ task: row[2], pts: row[3], cat: cat });
            }
        });

        renderList('list-sc', taskGroups["Self Care"], 'sc');
        renderList('list-sh', taskGroups["Spiritual Health"], 'sh');
        renderList('list-wl', taskGroups["Workload"], 'wl');

        document.getElementById('stats-content').innerHTML = Object.keys(stats).map(k => `
            <div class="score-card">
                <p class="big-xp">${stats[k].total}</p>
                <p style="color:#444; font-size: 0.6rem; letter-spacing:2px; margin:0;">${stats[k].display.toUpperCase()}</p>
            </div>
        `).join('');

        updateChart(stats);
    }

    function renderList(id, items, cls) {
        document.getElementById(id).innerHTML = items.map(i => `
            <div class="task-card ${cls}" onclick="complete('${currentUser}','${i.task}',${i.pts},'${i.cat}',this)">
                <div class="check-box"></div>
                <div style="font-size: 0.95rem; color: #bbb;">${i.task}</div>
                <div class="pts-tag">+${i.pts}</div>
            </div>
        `).join('') || '<p style="text-align:center; color:#222; margin-top:50px; font-size:0.8rem;">CLEAN SLATE</p>';
    }

    function complete(n, t, p, c, el) {
        el.style.opacity = '0.1';
        el.style.pointerEvents = 'none';
        fetch(`${SCRIPT_URL}?name=${n}&points=${p}&task=${encodeURIComponent(t)}&category=${c}`, {mode:'no-cors'});
        setTimeout(fetchData, 2000);
    }

    function updateChart(s) {
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['S','M','T','W','T','F','S'],
                datasets: [
                    { label:'Isabella', data:s.isabella.weekly, borderColor:'#777', borderWidth: 1, pointRadius: 0, tension:0.3 },
                    { label:'Liv', data:s.liv.weekly, borderColor:'#444', borderWidth: 1, pointRadius: 0, tension:0.3 }
                ]
            },
            options: { 
                maintainAspectRatio:false, 
                plugins:{legend:{display:false}}, 
                scales:{
                    y:{beginAtZero:true, grid:{color:'#111'}, ticks:{color:'#333'}}, 
                    x:{grid:{display:false}, ticks:{color:'#333'}}
                } 
            }
        });
    }

    fetchData();
    setInterval(fetchData, 30000);
</script>
</body>
</html>
