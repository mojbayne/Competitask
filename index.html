<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Arena | Clean Interaction</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --accent: #00ff88; --card: #161616; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* The "Blanket Button" and Form Area */
        .admin-controls { margin-bottom: 30px; text-align: center; width: 100%; max-width: 600px; }
        .form-link { background: var(--accent); color: black; padding: 12px 25px; text-decoration: none; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        #form-wrapper { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; background: #111; border-radius: 20px; margin-top: 15px; }
        #form-wrapper.open { max-height: 800px; padding: 20px 0; }

        .leaderboard { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .player-column { background: var(--card); padding: 30px; border-radius: 25px; min-width: 300px; border: 1px solid #222; text-align: center; }
        
        .score { font-size: 5rem; color: var(--accent); font-weight: 900; margin: 0; }
        .name-label { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 5px; color: #555; margin: 15px 0; }

        /* The "Blanking Out" Animation */
        .task-card { 
            background: #222; padding: 18px; margin-top: 12px; border-radius: 15px; 
            cursor: pointer; display: flex; align-items: center; border-left: 6px solid var(--accent);
            transition: all 0.4s ease;
        }
        .task-card:hover { transform: scale(1.02); background: #282828; }
        
        /* This is the "Blanked Out" state after ticking */
        .task-card.completed { 
            opacity: 0; 
            transform: scale(0.9); 
            pointer-events: none; 
            margin-top: -60px; /* Slides the other tasks up to fill the gap */
        }

        .check { width: 22px; height: 22px; border: 2px solid var(--accent); margin-right: 15px; border-radius: 6px; }
        .task-info { text-align: left; flex-grow: 1; }
        .pts-tag { color: #ffd700; font-weight: bold; font-size: 0.8rem; }

        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="mobile-web-app-capable" content="yes">
        <link rel="manifest" href="manifest.json">
    </style>
</head>
<body>

    <div class="admin-controls">
        <button class="form-link" onclick="toggleForm()">Create New Task +</button>
        <div id="form-wrapper">
            <iframe src="https://forms.gle/PrEQqYwBCdn8MGhh8" width="100%" height="600" frameborder="0">Loading…</iframe>
            <button onclick="toggleForm()" style="background:none; border:1px solid #444; color:#666; margin-top:10px; cursor:pointer; padding:5px 15px; border-radius:20px;">Close Form</button>
        </div>
    </div>

    <div class="leaderboard" id="arena">Syncing Arena...</div>

<script>
    const LIVE_TASKS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtF-7BhHKReQgwl6fhdU3UL8QqRvQHLWeNvU42tssJknaTXX0LZgqkeaZeSv6e_FT-cHOi6hlAvpEG/pub?gid=716577834&single=true&output=csv'; 
    const TALLY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtF-7BhHKReQgwl6fhdU3UL8QqRvQHLWeNvU42tssJknaTXX0LZgqkeaZeSv6e_FT-cHOi6hlAvpEG/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGpGNeEHRA6TaEONuGIUrkmHIBXJmf6DIy5y1NTLZm3GKlXJPAkgwyA6padN-wHERN-A/exec';

    function toggleForm() {
        document.getElementById('form-wrapper').classList.toggle('open');
    }

    async function refresh() {
        try {
            const [taskRes, tallyRes] = await Promise.all([fetch(LIVE_TASKS_CSV), fetch(TALLY_CSV)]);
            const taskText = await taskRes.text();
            const tallyText = await tallyRes.text();

            Papa.parse(taskText, { header: false, skipEmptyLines: true, complete: (tasks) => {
                Papa.parse(tallyText, { header: false, skipEmptyLines: true, complete: (tallies) => {
                    render(tasks.data, tallies.data);
                }});
            }});
        } catch (e) { console.error("Database sync issue"); }
    }

    function render(tasks, tallies) {
        let scores = { "Isabella": 0, "Liv": 0 };
        let boards = { "Isabella": [], "Liv": [] };

        // 1. Permanent Tally Sum
        tallies.forEach((row, i) => {
            if (i === 0) return;
            const name = row[1] ? row[1].trim() : "";
            const pts = parseInt(row[2]) || 0;
            if (scores.hasOwnProperty(name)) scores[name] += pts;
        });

        // 2. Penalty Check
        Object.keys(scores).forEach(n => { if(scores[n] >= 200) scores[n] -= 10; });

        // 3. Live Tasks (Current To-Do list)
        tasks.forEach((row, i) => {
            if (i === 0) return;
            const name = row[1] ? row[1].trim() : "";
            if (boards.hasOwnProperty(name)) {
                boards[name].push({ task: row[2], pts: row[3] });
            }
        });

        const container = document.getElementById('arena');
        container.innerHTML = '';

        Object.keys(scores).forEach(name => {
            let taskHtml = boards[name].map(t => `
                <div class="task-card" onclick="complete('${name}', '${t.task}', ${t.pts}, this)">
                    <div class="check"></div>
                    <div class="task-info">
                        <div style="font-weight:bold">${t.task || "New Task"}</div>
                        <span class="pts-tag">+${t.pts || 0} PTS</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML += `
                <div class="player-column">
                    <p class="score">${scores[name]}</p>
                    <div style="height:4px; width:40px; background:#333; margin:10px auto; border-radius:10px;"></div>
                    <h2 class="name-label">${name}</h2>
                    <div>${taskHtml || '<p style="color:#333">All tasks done!</p>'}</div>
                </div>
            `;
        });
    }

    function complete(name, task, pts, el) {
        // BLANK IT OUT: We add the 'completed' class immediately
        el.classList.add('completed');
        
        // SAVE TO DB
        fetch(`${SCRIPT_URL}?name=${name}&points=${pts}&task=${encodeURIComponent(task)}`, {mode: 'no-cors'});
        
        // Sync back with the sheet after it processes
        setTimeout(refresh, 2500);
    }

    refresh();
    setInterval(refresh, 45000); 
</script>
</body>
</html>
